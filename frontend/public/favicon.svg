<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background circle with dark indigo/slate theme -->
  <rect width="100" height="100" rx="22" fill="#0b0f19" />
  
  <!-- Glowing orbit ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.3" />
  
  <!-- Balanced Scale graphics -->
  <g transform="translate(0, 3)" filter="url(#glow)">
    <!-- Base pillar -->
    <path d="M46 76 L54 76 L52.5 45 L47.5 45 Z" fill="url(#grad)" />
    <!-- Stand feet -->
    <path d="M28 76 L72 76" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round" />
    <path d="M38 79 L62 79" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
    
    <!-- Central pivot point -->
    <circle cx="50" cy="40" r="4.5" fill="#f8fafc" />
    
    <!-- Horizontal balance beam -->
    <path d="M18 40 L82 40" stroke="url(#grad)" stroke-width="5" stroke-linecap="round" />
    
    <!-- Left pan cords and scale pan -->
    <path d="M20 40 L20 60" stroke="#f8fafc" stroke-width="2" opacity="0.8" />
    <path d="M11 60 C11 68, 29 68, 29 60 Z" fill="url(#grad)" />
    
    <!-- Right pan cords and scale pan -->
    <path d="M80 40 L80 60" stroke="#f8fafc" stroke-width="2" opacity="0.8" />
    <path d="M71 60 C71 68, 89 68, 89 60 Z" fill="url(#grad)" />
  </g>
</svg>
