<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Neon Gradient (Purple to Cyan) -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" /> <!-- Light Purple -->
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" /> <!-- Violet -->
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" /> <!-- Neon Cyan -->
    </linearGradient>
    
    <!-- Background Gradient (Deep Indigo to Rich Black) -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </radialGradient>
    
    <!-- Glow Effect Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base Circle with border -->
  <circle cx="256" cy="256" r="236" fill="url(#bgGrad)" stroke="url(#neonGrad)" stroke-width="12" />
  <circle cx="256" cy="256" r="248" fill="none" stroke="#8b5cf6" stroke-width="3" opacity="0.25" />

  <!-- Main glowing graphic group -->
  <g transform="translate(0, 10)" filter="url(#glow)">
    <!-- Base stand pillar (tapered) -->
    <path d="M234 370 L278 370 L266 210 L246 210 Z" fill="url(#neonGrad)" />
    
    <!-- Double Base Stands -->
    <path d="M150 370 L362 370" stroke="url(#neonGrad)" stroke-width="24" stroke-linecap="round" />
    <path d="M200 392 L312 392" stroke="#06b6d4" stroke-width="12" stroke-linecap="round" opacity="0.75" />
    
    <!-- Pivot connection -->
    <circle cx="256" cy="190" r="20" fill="#ffffff" />
    
    <!-- Sweeping cross beam -->
    <path d="M110 190 C 200 162, 312 162, 402 190" fill="none" stroke="url(#neonGrad)" stroke-width="24" stroke-linecap="round" />
    
    <!-- Left Scale pan hanging cords and bowl -->
    <path d="M120 190 L120 286" stroke="#f8fafc" stroke-width="8" stroke-linecap="round" opacity="0.8" />
    <path d="M80 286 C 80 326, 160 326, 160 286 Z" fill="url(#neonGrad)" />
    <circle cx="120" cy="286" r="8" fill="#ffffff" />
    
    <!-- Right Scale pan hanging cords and bowl -->
    <path d="M392 190 L392 286" stroke="#f8fafc" stroke-width="8" stroke-linecap="round" opacity="0.8" />
    <path d="M352 286 C 352 326, 432 326, 432 286 Z" fill="url(#neonGrad)" />
    <circle cx="392" cy="286" r="8" fill="#ffffff" />
  </g>
</svg>
