services:
  - type: web
    name: balance-scale-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FRONTEND_URL
        sync: false # Set this manually after deploying frontend on Vercel
    healthCheckPath: /health
